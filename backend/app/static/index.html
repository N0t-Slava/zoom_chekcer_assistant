<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        canvas: "#F7F5EE",
                        panel: "#FFFFFF",
                        ink: "#241C15",
                        muted: "#6B6B6B",
                        line: "#DDD8C8",
                        accent: "#FFE01B",
                        success: "#007C5C",
                        warning: "#A46A1F",
                        danger: "#C62828"
                    },
                    boxShadow: {
                        soft: "0 1px 2px rgba(36, 28, 21, 0.06), 0 10px 24px rgba(36, 28, 21, 0.05)"
                    }
                }
            }
        };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="min-h-screen overflow-x-auto bg-canvas text-ink antialiased">
    <div id="root"></div>
    <script>
        fetch("/static/app.jsx?v=2026-06-22-ui-cleanup")
            .then((response) => response.text())
            .then((source) => {
                const compiled = Babel.transform(source, {
                    presets: [["react", { runtime: "classic" }]]
                }).code;
                const script = document.createElement("script");
                script.textContent = compiled;
                document.body.appendChild(script);
            })
            .catch((error) => {
                document.getElementById("root").textContent = `Unable to load app: ${error.message}`;
            });
    </script>
</body>

</html>
