<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Checker</title>
    <link rel="stylesheet" href="/static/tailwind.css?v=2026-06-26" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="min-h-screen overflow-x-auto bg-canvas text-ink antialiased">
    <div id="root"></div>
    <script>
        fetch("/static/app.jsx?v=2026-06-25-buttons-icons")
            .then((response) => response.text())
            .then((source) => {
                const compiled = Babel.transform(source, {
                    presets: [["react", { runtime: "classic" }]]
                }).code;
                const script = document.createElement("script");
                script.textContent = compiled;
                document.body.appendChild(script);
            })
            .catch((error) => {
                document.getElementById("root").textContent = `Unable to load app: ${error.message}`;
            });
    </script>
</body>

</html>
